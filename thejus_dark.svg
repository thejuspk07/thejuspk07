/* NN_CSS_START */
.pulse-1 { animation: pulse 2s 0.4s infinite; }
.flash-1 { animation: flash 3s 0.4s infinite; }
.pulse-2 { animation: pulse 2s 0.8s infinite; }
.flash-2 { animation: flash 3s 0.8s infinite; }
.pulse-3 { animation: pulse 2s 1.2000000000000002s infinite; }
.flash-3 { animation: flash 3s 1.2000000000000002s infinite; }
.pulse-4 { animation: pulse 2s 1.6s infinite; }
.flash-4 { animation: flash 3s 1.6s infinite; }
.pulse-5 { animation: pulse 2s 2.0s infinite; }
.flash-5 { animation: flash 3s 2.0s infinite; }

@keyframes pulse {
  0% { r: 9px; opacity: 0.6; }
  50% { r: 12px; opacity: 0.0; }
  100% { r: 9px; opacity: 0.6; }
}
@keyframes flash {
  0% { opacity: 0.2; }
  50% { opacity: 0.8; }
  100% { opacity: 0.2; }
}
/* NN_CSS_END */
</style>
